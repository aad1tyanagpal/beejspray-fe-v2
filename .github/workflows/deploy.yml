name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Public App
        run: npx vite build --mode public
        env:
          VITE_BASE_PATH: /beejspray-fe-v2/

      - name: Build Seller App
        run: npx vite build --mode seller
        env:
          VITE_BASE_PATH: /beejspray-fe-v2/seller/

      - name: Merge builds
        run: |
          mkdir -p dist/final
          cp -r dist/public/. dist/final/
          if [ -d "dist/seller" ]; then
            mkdir -p dist/final/seller
            cp -r dist/seller/. dist/final/seller/
            echo "✅ Seller build merged"
          else
            echo "❌ dist/seller not found — seller build failed!"
            exit 1
          fi